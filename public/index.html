<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D7 Lead Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    header h1 { font-size: 20px; font-weight: 700; color: var(--accent); }
    #account-badge { font-size: 13px; color: var(--muted); display: flex; gap: 16px; flex: 1; }
    #account-badge span { color: var(--text); font-weight: 600; }
    #stop-btn { padding: 7px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; transition: background .15s; white-space: nowrap; }
    #stop-btn.running { background: var(--red); color: #fff; }
    #stop-btn.running:hover { background: #dc2626; }
    #stop-btn.stopped { background: var(--green); color: #fff; }
    #stop-btn.stopped:hover { background: #16a34a; }

    .layout { display: grid; grid-template-columns: 360px 1fr; gap: 0; height: calc(100vh - 57px); overflow: hidden; }

    /* ── Left panel ── */
    .panel-left { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .panel-section { padding: 20px; border-bottom: 1px solid var(--border); }
    .panel-section h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 14px; }

    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
    textarea, input[type=text], select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 8px 10px; font-size: 14px; resize: vertical; outline: none;
      transition: border-color .15s;
    }
    textarea:focus, input[type=text]:focus, select:focus { border-color: var(--accent); }
    textarea { min-height: 72px; }

    .form-group { margin-bottom: 14px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: background .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Job list ── */
    .job-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .job-card {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
      font-size: 13px; cursor: pointer; transition: border-color .15s;
    }
    .job-card:hover { border-color: var(--accent); }
    .job-card.selected { border-color: var(--accent); }
    .job-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .job-title { font-weight: 600; color: var(--text); }
    .job-meta { color: var(--muted); font-size: 12px; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .badge-queued   { background: #1e2a3a; color: var(--blue); }
    .badge-running  { background: #2a2000; color: var(--yellow); }
    .badge-done     { background: #0f2a1a; color: var(--green); }
    .badge-failed   { background: #2a0f0f; color: var(--red); }
    .job-error { color: var(--red); font-size: 12px; margin-top: 4px; }
    .no-jobs { color: var(--muted); font-size: 13px; text-align: center; padding: 32px 0; }

    /* ── Right panel ── */
    .panel-right { display: flex; flex-direction: column; overflow: hidden; }
    .panel-toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .panel-toolbar h2 { font-size: 14px; font-weight: 600; }
    #result-count { font-size: 13px; color: var(--muted); }

    /* ── Table ── */
    .table-wrap { flex: 1; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: var(--surface); position: sticky; top: 0; z-index: 1; padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: var(--surface); }
    td { padding: 9px 12px; color: var(--text); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td a { color: var(--accent); text-decoration: none; }
    td a:hover { text-decoration: underline; }
    .stars { color: var(--yellow); }
    .empty-results { color: var(--muted); text-align: center; padding: 48px; font-size: 14px; }

    /* ── Pagination ── */
    .pagination { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 13px; flex-shrink: 0; }
    .pagination button { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 13px; }
    .pagination button:disabled { opacity: .35; cursor: not-allowed; }
    .pagination button:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }
    .page-info { color: var(--muted); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  </style>
</head>
<body>

<header>
  <h1>D7 Lead Bot</h1>
  <div id="account-badge">Loading account…</div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
    <button id="stop-btn" class="running" onclick="toggleQueue()">⏹ Stop Queue</button>
    <span id="pause-reason" style="font-size:11px;color:#ef4444;max-width:260px;text-align:right;display:none"></span>
  </div>
</header>

<div class="layout">

  <!-- ── Left panel ── -->
  <div class="panel-left">

    <div class="panel-section">
      <h2>New Search</h2>

      <div class="form-group">
        <label>Keywords</label>
        <textarea id="keywords" placeholder="Dentist&#10;Plumber&#10;Electrician"></textarea>
        <div class="hint">One keyword per line</div>
      </div>

      <div class="form-group">
        <label>Cities / Locations</label>
        <textarea id="locations" placeholder="New York&#10;Los Angeles&#10;Chicago"></textarea>
        <div class="hint">One city per line</div>
      </div>

      <div class="form-group">
        <label>Country</label>
        <input type="text" id="country" value="US" maxlength="2" style="width:80px" />
      </div>

      <div class="form-group">
        <label>Source</label>
        <select id="scraper" onchange="onScraperChange()"></select>
      </div>

      <!-- Shown only when D7 Bulk Search is selected -->
      <div id="connect-panel" style="display:none;margin-bottom:14px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:12px;font-weight:600;color:var(--muted);">D7 Account</span>
          <span id="login-status-badge" style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:9999px;background:#1e2a3a;color:var(--muted);">Checking…</span>
        </div>
        <button class="btn btn-ghost btn-sm" id="connect-btn" onclick="connectD7()" style="width:100%;justify-content:center;">🔑 Connect D7 Account</button>
        <div id="connect-hint" style="font-size:11px;color:var(--muted);margin-top:6px;display:none;"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="run-btn" onclick="submitJobs()">
          <span>Run</span>
        </button>
        <button class="btn btn-ghost btn-sm" onclick="clearCompleted()">Clear done</button>
        <button class="btn btn-ghost btn-sm" onclick="clearAll()">Clear all</button>
      </div>
    </div>

    <!-- Job list -->
    <div class="job-list" id="job-list">
      <div class="no-jobs">No jobs yet — run a search above.</div>
    </div>

  </div>

  <!-- ── Right panel ── -->
  <div class="panel-right">
    <div class="panel-toolbar">
      <div style="display:flex;align-items:center;gap:12px">
        <h2>Results</h2>
        <span id="result-count">0 leads</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" onclick="downloadCsv()">Export CSV</button>
      </div>
    </div>

    <div class="table-wrap">
      <table id="results-table">
        <thead><tr></tr></thead>
        <tbody id="results-body">
          <tr><td colspan="9" class="empty-results">Results will appear here as jobs complete.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <button id="pg-prev" onclick="changePage(-1)" disabled>← Prev</button>
      <span class="page-info" id="pg-info">—</span>
      <button id="pg-next" onclick="changePage(1)" disabled>Next →</button>
    </div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allResults = [];
let allColumns = [];
let queueStopped = false;
let currentPage = 0;
const PAGE_SIZE = 100;
let lastResultCount = -1; // track to avoid unnecessary re-renders

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await loadScrapers();
  await refreshAccount();
  await refreshQueueStatus();
  await pollJobs();
  setInterval(pollJobs, 2500);
  setInterval(refreshAccount, 30000);
  setInterval(refreshQueueStatus, 2500);
}

// ── Queue stop / resume ───────────────────────────────────────────────────────
async function toggleQueue() {
  const btn = document.getElementById('stop-btn');
  btn.disabled = true;
  try {
    if (queueStopped) {
      await api('POST', '/api/queue/resume');
    } else {
      await api('POST', '/api/queue/stop');
    }
    await refreshQueueStatus();
  } finally {
    btn.disabled = false;
  }
}

async function refreshQueueStatus() {
  try {
    const status = await api('GET', '/api/queue/status');
    queueStopped = status.stopped;
    const btn = document.getElementById('stop-btn');
    const reasonEl = document.getElementById('pause-reason');
    if (queueStopped) {
      btn.className = 'stopped';
      btn.textContent = '▶ Resume Queue';
      if (status.pauseReason) {
        reasonEl.textContent = '⚠ Paused: ' + status.pauseReason;
        reasonEl.style.display = 'block';
      }
    } else {
      btn.className = 'running';
      btn.textContent = '⏹ Stop Queue';
      reasonEl.style.display = 'none';
      reasonEl.textContent = '';
    }
  } catch { /* ignore */ }
}

// ── Scrapers ─────────────────────────────────────────────────────────────────
async function loadScrapers() {
  const scrapers = await api('GET', '/api/scrapers');
  const sel = document.getElementById('scraper');
  sel.innerHTML = scrapers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  onScraperChange();
}

function onScraperChange() {
  const scraperId = document.getElementById('scraper').value;
  const panel = document.getElementById('connect-panel');
  panel.style.display = scraperId === 'd7-bulk' ? 'block' : 'none';
  if (scraperId === 'd7-bulk') refreshLoginStatus();
}

// ── D7 Account connect ────────────────────────────────────────────────────────
let loginPolling = null;

async function connectD7() {
  const btn = document.getElementById('connect-btn');
  const hint = document.getElementById('connect-hint');
  btn.disabled = true;
  hint.style.display = 'block';
  hint.textContent = 'Browser opening… solve the CAPTCHA, then this updates automatically.';

  try {
    await api('POST', '/api/auth/d7-bulk/start');
    // Poll status until connected or error
    loginPolling = setInterval(async () => {
      const s = await api('GET', '/api/auth/d7-bulk/status').catch(() => null);
      if (!s) return;
      updateLoginBadge(s);
      if (s.state === 'connected' || s.state === 'error') {
        clearInterval(loginPolling);
        loginPolling = null;
        btn.disabled = false;
        hint.style.display = s.state === 'connected' ? 'none' : 'block';
        if (s.state === 'error') hint.textContent = 'Error: ' + (s.error || 'Login failed');
      }
    }, 2000);
  } catch (err) {
    btn.disabled = false;
    hint.textContent = 'Error: ' + err.message;
  }
}

async function refreshLoginStatus() {
  const s = await api('GET', '/api/auth/d7-bulk/status').catch(() => null);
  if (s) updateLoginBadge(s);
}

function updateLoginBadge(s) {
  const badge = document.getElementById('login-status-badge');
  if (s.state === 'connected' || s.hasSession) {
    badge.style.background = '#0f2a1a'; badge.style.color = '#22c55e';
    badge.textContent = '✓ Connected';
  } else if (s.state === 'waiting') {
    badge.style.background = '#2a2000'; badge.style.color = '#eab308';
    badge.textContent = '⟳ Waiting…';
  } else if (s.state === 'error') {
    badge.style.background = '#2a0f0f'; badge.style.color = '#ef4444';
    badge.textContent = '✗ Not connected';
  } else {
    badge.style.background = '#1e2a3a'; badge.style.color = '#8892a4';
    badge.textContent = s.hasSession ? '✓ Connected' : '✗ Not connected';
  }
}

// ── Account badge ─────────────────────────────────────────────────────────────
async function refreshAccount() {
  const scraperId = document.getElementById('scraper').value || 'd7';
  try {
    const info = await api('GET', `/api/account/${scraperId}`);
    document.getElementById('account-badge').innerHTML =
      `Searches today: <span>${info.usedToday}</span> &nbsp;|&nbsp; ` +
      `Remaining: <span>${info.remaining}</span> &nbsp;|&nbsp; ` +
      `Daily limit: <span>${info.dailyLimit}</span>`;
  } catch {
    document.getElementById('account-badge').textContent = 'Account unavailable';
  }
}

// ── Submit jobs ───────────────────────────────────────────────────────────────
async function submitJobs() {
  const keywords = document.getElementById('keywords').value.trim().split('\n').map(s => s.trim()).filter(Boolean);
  const locations = document.getElementById('locations').value.trim().split('\n').map(s => s.trim()).filter(Boolean);
  const country = document.getElementById('country').value.trim() || 'US';
  const scraperId = document.getElementById('scraper').value;

  if (!keywords.length || !locations.length) {
    alert('Please enter at least one keyword and one location.');
    return;
  }

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span><span>Queuing…</span>';

  try {
    await api('POST', '/api/jobs', { keywords, locations, country, scraperId });
    await pollJobs();
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>Run</span>';
  }
}

// ── Poll jobs ─────────────────────────────────────────────────────────────────
async function pollJobs() {
  const jobs = await api('GET', '/api/jobs');
  renderJobs(jobs);

  // Only re-fetch results when the total done count changes
  const doneCount = jobs.reduce((n, j) => n + (j.status === 'done' ? j.resultCount : 0), 0);
  if (doneCount !== lastResultCount) {
    lastResultCount = doneCount;
    allResults = await api('GET', '/api/results');
    currentPage = 0;
    renderResults(allResults);
  }
}

// ── Pagination ────────────────────────────────────────────────────────────────
function changePage(dir) {
  const totalPages = Math.ceil(allResults.length / PAGE_SIZE);
  currentPage = Math.max(0, Math.min(currentPage + dir, totalPages - 1));
  renderResults(allResults);
  document.querySelector('.table-wrap').scrollTop = 0;
}

// ── Clear ─────────────────────────────────────────────────────────────────────
async function clearCompleted() {
  await api('DELETE', '/api/jobs/completed');
  lastResultCount = -1;
  await pollJobs();
}
async function clearAll() {
  if (!confirm('Clear all jobs and results?')) return;
  await api('DELETE', '/api/jobs');
  allResults = [];
  lastResultCount = -1;
  currentPage = 0;
  renderResults([]);
  await pollJobs();
}

// ── Render jobs ───────────────────────────────────────────────────────────────
function renderJobs(jobs) {
  const el = document.getElementById('job-list');
  if (!jobs.length) {
    el.innerHTML = '<div class="no-jobs">No jobs yet — run a search above.</div>';
    return;
  }
  el.innerHTML = jobs.map(job => {
    const badge = `<span class="badge badge-${job.status}">${statusLabel(job)}</span>`;
    const error = job.error ? `<div class="job-error">${esc(job.error)}</div>` : '';
    const count = job.status === 'done' ? ` · ${job.resultCount} leads` : '';
    return `<div class="job-card">
      <div class="job-header">
        <span class="job-title">${esc(job.location)}</span>
        ${badge}
      </div>
      <div class="job-meta">${esc(job.country)} · ${esc(job.keywords.join(', '))}${count}</div>
      ${error}
    </div>`;
  }).join('');
}

function statusLabel(job) {
  if (job.status === 'running') return '⟳ running';
  if (job.status === 'queued')  return '… queued';
  if (job.status === 'done')    return '✓ done';
  return '✗ failed';
}

// ── Render results (paginated, all columns dynamic) ───────────────────────────
function renderResults(results) {
  const count  = document.getElementById('result-count');
  const thead  = document.querySelector('#results-table thead tr');
  const tbody  = document.getElementById('results-body');
  const pgInfo = document.getElementById('pg-info');
  const pgPrev = document.getElementById('pg-prev');
  const pgNext = document.getElementById('pg-next');

  count.textContent = `${results.length.toLocaleString()} lead${results.length !== 1 ? 's' : ''}`;

  if (!results.length) {
    thead.innerHTML = '<th>Name</th><th>Phone</th><th>Email</th><th>Website</th><th>Address</th><th>Category</th>';
    tbody.innerHTML = '<tr><td colspan="6" class="empty-results">Results will appear here as jobs complete.</td></tr>';
    pgInfo.textContent = '—';
    pgPrev.disabled = true;
    pgNext.disabled = true;
    return;
  }

  // Derive column list from all results (preserve insertion order, deduplicate)
  const colSet = new Map();
  for (const r of results) Object.keys(r).forEach(k => colSet.set(k, true));
  allColumns = Array.from(colSet.keys());

  // Render header
  thead.innerHTML = allColumns.map(c => `<th>${esc(c)}</th>`).join('');

  // Paginate
  const totalPages = Math.ceil(results.length / PAGE_SIZE);
  currentPage = Math.min(currentPage, totalPages - 1);
  const start = currentPage * PAGE_SIZE;
  const page  = results.slice(start, start + PAGE_SIZE);

  // Render rows — only current page (100 rows), never all at once
  tbody.innerHTML = page.map(r => {
    const cells = allColumns.map(c => {
      const v = r[c] ?? '';
      const isUrl = v.startsWith('http');
      return `<td title="${esc(v)}">${isUrl ? `<a href="${esc(v)}" target="_blank">${esc(v)}</a>` : esc(v)}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  pgInfo.textContent = `Page ${currentPage + 1} of ${totalPages} (${start + 1}–${Math.min(start + PAGE_SIZE, results.length)} of ${results.length.toLocaleString()})`;
  pgPrev.disabled = currentPage === 0;
  pgNext.disabled = currentPage >= totalPages - 1;
}

// ── Export CSV ────────────────────────────────────────────────────────────────
function downloadCsv() {
  window.open('/api/results/csv');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>

</body>
</html>
